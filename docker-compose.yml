services:
  llama-engine:
    build: ./llm
    image: my-local-rpi-llama  # <--- UNIQUE NAME
    container_name: llama-edge-server
    restart: unless-stopped
    ports:
      - "8090:8081"
    volumes:
      - ./models:/models
    command: 
      - "-m"
      - "/models/model.gguf"
      - "-c"
      - "2048"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8081"
      - "-t"
      - "4"
      - "-fa"
      - "on"
  backend:
    build:
      context: ./backend
    image: cv-portfolio-backend
    container_name: cv-portfolio-backend
    restart: unless-stopped
    ports:
      - "3234:8000"
    environment:
      LLAMA_HOST: llama-engine
      LLAMA_PORT: 8081
    depends_on:
      - llama-engine